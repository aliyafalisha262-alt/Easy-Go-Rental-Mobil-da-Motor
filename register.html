<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - EasyGo</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="register.css">
</head>
<body>

<main class="register-wrapper">
    <div class="register-card card-surface">
        <div class="text-center mb-4">
            <span class="eyebrow">Bergabung Bersama Kami</span>
            <h2>Registrasi EasyGo</h2>
            <p class="text-muted">Lengkapi data diri Anda di bawah ini untuk membuat akun baru.</p>
        </div>

        <form id="registerform">
            <div class="row g-3">
                <!-- Baris 1 -->
                <div class="col-md-6">
                    <label for="nama" class="form-label">Nama Lengkap</label>
                    <input type="text" id="nama" class="form-control" placeholder="Masukkan nama">
                    <div id="error-nama" class="field-error hidden"></div>
                </div>
                <div class="col-md-6">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Hanya huruf & angka">
                    <div id="error-username" class="field-error hidden"></div>
                </div>

                <!-- Baris 2 -->
                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="contoh@email.com">
                    <div id="error-email" class="field-error hidden"></div>
                </div>
                <div class="col-md-6">
                    <label for="nohp" class="form-label">No HP</label>
                    <input type="text" id="nohp" class="form-control" placeholder="08xxxxxxxxxx">
                    <div id="error-nohp" class="field-error hidden"></div>
                </div>

                <!-- Baris 3 -->
                <div class="col-md-6">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Minimal 8 karakter">
                    <div id="error-password" class="field-error hidden"></div>
                </div>
                <div class="col-md-6">
                    <label for="confirmpassword" class="form-label">Konfirmasi Password</label>
                    <input type="password" id="confirmpassword" class="form-control" placeholder="Ulangi password">
                    <div id="error-confirmpassword" class="field-error hidden"></div>
                </div>

                <!-- Baris 4 -->
                <div class="col-md-6">
                    <label for="tanggal" class="form-label">Tanggal Lahir</label>
                    <input type="date" id="tanggal" class="form-control">
                    <div id="error-tanggal" class="field-error hidden"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label d-block">Jenis Kelamin</label>
                    <div class="form-check form-check-inline mt-2">
                        <input class="form-check-input" type="radio" name="gender" id="genderL" value="L">
                        <label class="form-check-label" for="genderL">Laki-laki</label>
                    </div>
                    <div class="form-check form-check-inline mt-2">
                        <input class="form-check-input" type="radio" name="gender" id="genderP" value="P">
                        <label class="form-check-label" for="genderP">Perempuan</label>
                    </div>
                    <div id="error-gender" class="field-error hidden"></div>
                </div>

                <!-- Baris 5 -->
                <div class="col-12">
                    <label for="foto" class="form-label">Upload Identitas (KTP/KK)</label>
                    <input type="file" id="foto" class="form-control" accept="image/jpeg, image/png">
                    <div class="form-text text-muted" style="font-size: 12px;">Format JPG/PNG, Maks 1MB.</div>
                    <div id="error-foto" class="field-error hidden"></div>
                </div>

                <!-- Baris 6 -->
                <div class="col-12">
                    <label for="alamat" class="form-label">Alamat Lengkap</label>
                    <textarea id="alamat" name="alamat" class="form-control" rows="3" placeholder="Masukkan alamat domisili"></textarea>
                    <div id="error-alamat" class="field-error hidden"></div>
                </div>

                <!-- Baris 7 -->
                <div class="col-12 mt-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="setuju">
                        <label class="form-check-label text-muted" for="setuju" style="font-size: 14px;">
                            Saya setuju dengan syarat & ketentuan yang berlaku
                        </label>
                    </div>
                    <div id="error-setuju" class="field-error hidden"></div>
                </div>

                <!-- Tombol -->
                <div class="col-12 mt-4">
                    <button type="submit" class="btn-book w-100">Daftar Akun</button>
                </div>
                
                <div class="col-12 text-center mt-3 text-muted" style="font-size: 14px;">
                    Sudah punya akun? <a href="login.html" class="text-brand fw-bold text-decoration-none">Login di sini</a>
                </div>
            </div>
        </form>
    </div>
</main>
    
<script src="register.js"></script>
<script src="animasi.js"></script> <!-- Tambahkan ini -->
</body>
</html>
