<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EasyGo</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="login.css">
</head>
<body>

<main class="login-wrapper">
    <div class="login-card card-surface">
        <div class="text-center mb-4">
            <span class="eyebrow">Selamat Datang</span>
            <h2>Masuk ke EasyGo</h2>
            <p class="text-muted">Silakan masukkan username dan password Anda untuk melanjutkan.</p>
        </div>

        <form id="loginForm" action="#" method="post">
            <!-- Tempat untuk menampilkan error modern -->
            <div id="errorMessage" class="error-msg hidden"></div>

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan username Anda" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Minimal 8 karakter" required>
                </div>
            </div>

            <button type="submit" class="btn-book w-100">Login</button>
            
            <div class="text-center mt-4 text-muted" style="font-size: 14px;">
                Belum punya akun? <a href="register.html" class="text-brand fw-bold text-decoration-none">Daftar di sini</a>
            </div>
        </form>
    </div>
</main>

    
    <script src="login.js"></script>
    <script src="animasi.js"></script> 
</body>
</html>
